sonar.projectKey=privacybydesign_vcmrtd
sonar.organization=privacybydesign


# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=vcmrtd
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

# Disable C/C++/Objective-C analysis (no compilation database available)
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-

# Tell SonarQube what is source code and what is test code
sonar.sources=lib,example/lib
sonar.tests=test,example/test

# Coverage report (merged from both packages, see CI)
sonar.dart.lcov.reportPaths=coverage/lcov.info