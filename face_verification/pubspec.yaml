name: face_verification
description: Face verification and liveness detection — standalone package for use with vcmrtd documents

version: 1.0.0
publish_to: none

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.0+4
  image: ^4.5.4
  flutter_litert: ^2.8.3
  native_toolchain_c: ^0.18.0
  logging: ^1.3.0
  meta: ^1.15.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  test: ^1.16.5
  lints: ^6.0.0

flutter:
  assets:
    - lib/src/face_verification/Models/face_detector.tflite
    - lib/src/face_verification/Models/face_landmarks_detector.tflite
    - lib/src/face_verification/Models/face_blendshapes.tflite
    - lib/src/face_verification/Models/minifasnet_v1se.tflite
    - lib/src/face_verification/Models/minifasnet_v2.tflite
    - lib/src/face_verification/Models/bigsmall_1.tflite
    - lib/src/face_verification/Models/bigsmall_2.tflite
    - lib/src/face_verification/Models/bigsmall_3.tflite
    - lib/src/face_verification/Models/GhostFaceNet_fp32_V2.tflite
