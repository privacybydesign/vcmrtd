# Workflow to check whether changes to master fulfill all requirements.
name: Status checks

on:
  push:
    branches: [ master ]
  pull_request:
  schedule:
    # Run every monday on 9:00 in the morning (UTC).
    - cron: "0 9 * * 1"
  # Make it possible to trigger the checks manually.
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./vcmrtd/example
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment
      - run: bundle exec fastlane lint

  unit-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment
      - name: Run vcmrtd tests with coverage
        working-directory: ./vcmrtd
        run: flutter test --coverage
      - name: Run face_verification tests with coverage
        working-directory: ./face_verification
        run: flutter test --coverage
      - name: Upload vcmrtd coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: vcmrtd/coverage/lcov.info
          flags: vcmrtd
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload face_verification coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: face_verification/coverage/lcov.info
          flags: face_verification
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment
      - name: Run vcmrtd tests with coverage
        working-directory: ./vcmrtd
        run: flutter test --coverage
      - name: Run example tests with coverage
        working-directory: ./vcmrtd/example
        run: flutter test --coverage
      - name: Run face_verification tests with coverage
        working-directory: ./face_verification
        run: flutter test --coverage
      - name: Merge coverage reports
        run: |
          mkdir -p coverage
          sed 's|SF:lib/|SF:vcmrtd/lib/|g' vcmrtd/coverage/lcov.info > coverage/lcov.info
          sed 's|SF:lib/|SF:vcmrtd/example/lib/|g' vcmrtd/example/coverage/lcov.info >> coverage/lcov.info
          sed 's|SF:lib/|SF:face_verification/lib/|g' face_verification/coverage/lcov.info >> coverage/lcov.info
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-prototypes-android:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ./vcmrtd/example
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment
      - run: flutter build apk -t lib/main.dart
      - uses: actions/upload-artifact@v4
        with:
          name: prototypes-android
          path: ./vcmrtd/example/build/app/outputs/apk/release/*.apk
