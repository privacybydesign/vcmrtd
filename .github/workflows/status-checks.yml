# Workflow to check whether changes to master fulfill all requirements.
name: Status checks

on:
  push:
    branches: [ master ]
  pull_request:
  schedule:
    # Run every monday on 9:00 in the morning (UTC).
    - cron: "0 9 * * 1"
  # Make it possible to trigger the checks manually.
  workflow_dispatch:

jobs:
  # We make sure that lint succeeds before we start any other job to
  # prevent that the setup-build-environment action runs in parallel.
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./example
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment
      - run: bundle exec fastlane lint

  unit-test:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: .
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          flags: dart
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build-prototypes-android:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: ./example
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Setup build environment
        uses: ./.github/actions/setup-build-environment
      - run: flutter build apk -t lib/main.dart
      - uses: actions/upload-artifact@v4
        with:
          name: prototypes-android
          path: ./example/build/app/outputs/apk/release/*.apk
