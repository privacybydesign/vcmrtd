version: 1.0.0
publish_to: none

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  image: ^4.5.4
  flutter_litert: ^2.8.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  test: ^1.16.5
  lints: ^6.0.0

flutter:
  assets:
    - lib/src/models/face_detector.tflite
    - lib/src/models/face_landmarks_detector.tflite
